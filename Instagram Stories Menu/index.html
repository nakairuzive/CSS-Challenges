<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,400;0,800;1,200&display=swap" rel="stylesheet">
    <title>Instagram Stories Menu</title>
</head>
<body>
    <ul class="stories-menu">
        <li class="story new">
            <div class="img-wrapper">
                <img src="images/user-1.png" class="story-img" alt="An profile photo of a woman of east asian descent">
            </div>
            <p class="username">Amanda_Bear</p>
        </li>
        <li class="story viewed live">
            <div class="img-wrapper">
                <img src="images/user-2.png" class="story-img" alt="A side profile image of a female pilot">
            </div>
            <p class="username">Vivian_Pilot</p>
        </li>
        <li class="story new">
            <div class="img-wrapper"> 
                <img src="images/user-3.jpg" class="story-img" alt="A profile photo of an man holding a bow and arrow">
            </div>
            <p class="username">Hunter_Hunter</p>
        </li>
    </ul>
</body>
</html>
